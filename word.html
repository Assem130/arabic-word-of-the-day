<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="كلمة اليوم من كَلِمات: معناها، نطقها، جذرها، وسياقها.">
    <title>كَلِمات | كلمة اليوم</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'none'">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="revamp.css">
</head>
<body class="word-page">
    <svg class="svg-sprite" aria-hidden="true">
        <defs>
            <symbol id="i-book-open" viewBox="0 0 24 24"><path d="M12 7v14M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></symbol>
            <symbol id="i-calendar" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></symbol>
            <symbol id="i-bars" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></symbol>
            <symbol id="i-volume-high" viewBox="0 0 24 24"><path d="M11 5 6 9H2v6h4l5 4zM15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/></symbol>
            <symbol id="i-waveform" viewBox="0 0 24 24"><path d="M2 12h2M6 9v6M10 5v14M14 8v8M18 10v4M22 12h0"/></symbol>
            <symbol id="i-xmark" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></symbol>
            <symbol id="i-share" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5l-6.8 4"/></symbol>
            <symbol id="i-copy" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></symbol>
            <symbol id="i-arrow" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></symbol>
        </defs>
    </svg>

    <main class="page-shell">
        <header class="nav-wrap">
            <nav class="nav" aria-label="التنقل الرئيسي">
                <a class="brand" href="index.html" aria-label="كلمات، الصفحة الرئيسية">
                    <svg class="icon"><use href="#i-book-open"/></svg>
                    <span>كَلِمات</span>
                </a>
                <p class="nav-note">كلمة اليوم</p>
                <div class="nav-actions">
                    <button class="icon-button" id="btn-toggle-history" title="المخزون اللغوي" aria-label="فتح المخزون اللغوي">
                        <svg class="icon"><use href="#i-calendar"/></svg>
                        <span class="badge" id="history-count">0</span>
                    </button>
                    <button class="icon-button" id="btn-toggle-menu" title="القائمة" aria-label="فتح القائمة">
                        <svg class="icon"><use href="#i-bars"/></svg>
                    </button>
                </div>
            </nav>
        </header>

        <section class="word-stage word-stage--focused">
            <aside class="word-intro">
                <a class="back-link" href="index.html"><svg class="icon"><use href="#i-arrow"/></svg> العودة إلى البداية</a>
                <p class="eyebrow">موعدك اليومي مع العربية</p>
                <h1>كلمة واحدة.<br>بكل ما فيها.</h1>
                <div class="word-date">
                    <span>اليوم</span>
                    <strong id="date-display">...</strong>
                </div>
                <p class="next-word">الكلمة التالية خلال <b id="countdown-timer">--:--:--</b></p>
            </aside>

            <article class="word-card" id="word-card">
                <div class="word-card-top">
                    <div>
                        <p class="card-kicker">كلمة اليوم</p>
                        <h2 class="main-word" id="main-word" aria-label="الكلمة اليومية">...</h2>
                    </div>
                    <button class="speak-button" id="btn-speak" title="استمع إلى النطق">
                        <svg class="icon"><use href="#i-volume-high"/></svg>
                        <span>استمع</span>
                    </button>
                </div>

                <div class="linguistic-data" aria-label="بيانات لغوية">
                    <div><span>الضبط</span><strong id="word-vocalization">...</strong></div>
                    <div><span>الوزن</span><strong id="word-weight">...</strong></div>
                    <div><span>الجذر</span><strong id="word-root">...</strong></div>
                    <div><span>التصنيف</span><strong id="word-category">...</strong></div>
                </div>

                <div class="meaning-panel">
                    <p>المعنى</p>
                    <div class="meaning-text" id="word-meaning">...</div>
                </div>

                <blockquote class="example-panel" id="word-example-text">...</blockquote>
            </article>
        </section>
    </main>

    <aside class="history-drawer" id="history-drawer" aria-label="أرشيف الكلمات">
        <header>
            <div><p>مخزونك اللغوي</p><h2>الكلمات التي مرّت من هنا</h2></div>
            <button class="icon-button" id="btn-close-drawer" title="إغلاق" aria-label="إغلاق">
                <svg class="icon"><use href="#i-xmark"/></svg>
            </button>
        </header>
        <div class="drawer-content">
            <p class="drawer-empty-msg" id="drawer-empty-msg">لم تفتح أي كلمات بعد.</p>
            <ul class="history-list" id="history-list"></ul>
        </div>
    </aside>

    <div class="app-menu-dropdown" id="app-menu-dropdown">
        <button id="btn-share"><svg class="icon"><use href="#i-share"/></svg> مشاركة الكلمة</button>
        <button id="btn-copy-link"><svg class="icon"><use href="#i-copy"/></svg> نسخ تفاصيلها</button>
    </div>

    <div class="toast" id="toast" role="status">تم نسخ الكلمة بنجاح.</div>
    <script src="app.js" charset="utf-8"></script>
</body>
</html>
